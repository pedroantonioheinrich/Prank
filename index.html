<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Segurança</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #tela-inicial {
            text-align: center;
            animation: pulsar 2s ease-in-out infinite;
        }
        
        @keyframes pulsar {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        #tela-inicial h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #0f0;
        }
        
        #tela-inicial p {
            font-size: 16px;
            color: #0a0;
            margin-bottom: 40px;
        }
        
        #botao-clique {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 24px;
            padding: 20px 60px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        
        #botao-clique:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
        }
        
        .cursor-piscante::after {
            content: '█';
            animation: blink 0.5s infinite;
        }
        
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
        #terminal {
            display: none;
            padding: 40px;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .linha {
            opacity: 0;
            animation: aparecer 0.1s forwards;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 2px;
        }
        
        @keyframes aparecer {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        .vermelho { color: #f00; }
        .amarelo { color: #ff0; }
        .verde { color: #0f0; }
        .cinza { color: #666; }
        .branco { color: #fff; }
        .roxo { color: #a0f; }
        .piscante { animation: blink 0.5s infinite; }
        
        .barra-container {
            width: 400px;
            height: 20px;
            border: 1px solid #0f0;
            margin: 10px 0;
            position: relative;
        }
        
        .barra-preenchimento {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.3s;
        }
        
        .status-text {
            color: #0f0;
            font-size: 14px;
            margin-top: 5px;
        }
        
        #countdown {
            font-size: 48px;
            color: #f00;
            font-weight: bold;
            margin: 20px 0;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <!-- TELA INICIAL - A pessoa PRECISA clicar aqui -->
    <div id="tela-inicial">
        <h1>❤️ MENSAGEM ESPECIAL PRA VOCÊ</h1>
        <p>Tenho uma mensagem especial pora você...</p>
        <button id="botao-clique" class="cursor-piscante">▶ Clique para ver</button>
    </div>

    <!-- TERMINAL (escondido até clicar) -->
    <div id="terminal"></div>

    <script>
        // === QUANDO A PESSOA CLICA ===
        document.getElementById('botao-clique').addEventListener('click', function() {
            // 1️⃣ Entra em tela cheia (agora funciona porque teve clique!)
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
            
            // 2️⃣ Esconde a tela inicial e mostra o terminal
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('terminal').style.display = 'block';
            
            // 3️⃣ Inicia o "hack" simulado
            iniciarHack();
        });

        // Impede ESC de sair da tela cheia
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if (el.msRequestFullscreen) el.msRequestFullscreen();
            }
        });

        // === SISTEMA DE TERMINAL ===
        const terminal = document.getElementById('terminal');
        
        function adicionarLinha(texto, cor = 'verde', delay = 50) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = `linha ${cor}`;
                    div.textContent = texto;
                    terminal.appendChild(div);
                    terminal.scrollTop = terminal.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        function adicionarHTML(html, cor = 'verde', delay = 50) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = `linha ${cor}`;
                    div.innerHTML = html;
                    terminal.appendChild(div);
                    terminal.scrollTop = terminal.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function iniciarHack() {
            // FASE 1: ACESSO INICIAL
            await adicionarLinha('Inicializando sistema de acesso remoto...', 'cinza', 300);
            await adicionarLinha('[>] Escaneando porta 22...', 'verde', 500);
            await adicionarLinha('[>] Escaneando porta 443...', 'verde', 400);
            await adicionarLinha('[>] Escaneando porta 3389...', 'verde', 300);
            await adicionarLinha('');
            await adicionarLinha('╔══════════════════════════════════════╗', 'verde', 200);
            await adicionarLinha('║   🔓 ACESSO REMOTO DETECTADO         ║', 'amarelo', 200);
            await adicionarLinha('║   IP: 192.168.xxx.xxx                 ║', 'amarelo', 200);
            await adicionarLinha('║   PORTA: 3389 (RDP)                   ║', 'amarelo', 200);
            await adicionarLinha('║   HOSTNAME: DESKTOP-XXXXX            ║', 'amarelo', 200);
            await adicionarLinha('╚══════════════════════════════════════╝', 'verde', 200);
            await adicionarLinha('');

            // FASE 2: BRUTE FORCE
            await adicionarLinha('[>] Iniciando ataque de força bruta...', 'amarelo', 500);
            
            const senhas = ['admin123', 'password', '123456', 'senha', 'admin'];
            for (let i = 0; i < senhas.length; i++) {
                await adicionarLinha(`    Tentativa ${i+1}/${senhas.length}: ${senhas[i]} → FALHA`, 'vermelho', 200);
            }
            
            await adicionarLinha('    Tentativa 6/5: ******** →', 'verde', 300);
            await adicionarHTML('    <span class="piscante" style="color: #0f0;">✅ ACESSO CONCEDIDO!</span>', 'verde', 400);
            await adicionarLinha('');

            // FASE 3: EXTRAÇÃO DE DADOS
            await adicionarLinha('[>] Estabelecendo conexão SSH...', 'verde', 300);
            await adicionarLinha('[>] Conexão estabelecida com sucesso!', 'verde', 200);
            await adicionarLinha('[>] Iniciando extração de dados...', 'amarelo', 400);
            
            const progressoHTML = `
                <div style="margin: 10px 0;">
                    <div class="barra-container">
                        <div class="barra-preenchimento" id="barra"></div>
                    </div>
                    <div class="status-text" id="statusProgresso">Extraindo dados: 0%</div>
                </div>
            `;
            await adicionarHTML(progressoHTML, 'verde', 200);

            for (let i = 0; i <= 100; i += Math.floor(Math.random() * 8) + 3) {
                if (i > 100) i = 100;
                const barra = document.getElementById('barra');
                const status = document.getElementById('statusProgresso');
                if (barra) barra.style.width = i + '%';
                if (status) status.textContent = `Extraindo dados: ${i}%`;
                await new Promise(r => setTimeout(r, 100));
            }

            await adicionarLinha('');

            // FASE 4: ARQUIVOS ENCONTRADOS
            await adicionarLinha('╔══════════════════════════════════════╗', 'roxo', 200);
            await adicionarLinha('║   📁 ARQUIVOS ENCONTRADOS            ║', 'roxo', 200);
            await adicionarLinha('╠══════════════════════════════════════╣', 'roxo', 100);
            await adicionarLinha('║  📄 documentos_pessoais/            ║', 'branco', 100);
            await adicionarLinha('║  📄 fotos_privadas/                 ║', 'branco', 100);
            await adicionarLinha('║  📄 senhas_bancarias.txt            ║', 'branco', 100);
            await adicionarLinha('║  📄 historico_navegacao/            ║', 'branco', 100);
            await adicionarLinha('║  📄 webcam_gravacoes/               ║', 'branco', 100);
            await adicionarLinha('╚══════════════════════════════════════╝', 'roxo', 200);
            await adicionarLinha('');
            await adicionarLinha('[>] Baixando arquivos selecionados...', 'amarelo', 300);

            // FASE 5: WEBCAM
            await adicionarLinha('');
            await adicionarLinha('╔══════════════════════════════════════╗', 'vermelho', 300);
            await adicionarLinha('║   📷 ACESSO À WEBCAM ATIVADO        ║', 'vermelho', 200);
            await adicionarLinha('║   Transmitindo vídeo ao vivo...     ║', 'vermelho', 200);
            await adicionarHTML('║   <span class="piscante">🔴 GRAVANDO...</span>                 ║', 'vermelho', 200);
            await adicionarLinha('╚══════════════════════════════════════╝', 'vermelho', 200);
            await adicionarLinha('');

            // FASE 6: MENSAGEM FINAL
            await adicionarLinha('', 'verde', 500);
            await adicionarHTML(`
                <div style="border: 2px solid #f00; padding: 20px; margin: 20px 0; text-align: center;">
                    <div style="font-size: 32px; color: #f00; margin-bottom: 10px;">⚠️ SISTEMA COMPROMETIDO ⚠️</div>
                    <div style="color: #fff; font-size: 18px; margin-bottom: 20px;">
                        Seus dados foram extraídos com sucesso.
                    </div>
                    <div style="color: #ff0; font-size: 14px;">
                        Para recuperar o acesso, entre em contato conosco em:<br>
                        <span style="color: #0ff;">resgate@hacker-falso.xyz</span>
                    </div>
                    <div id="countdown" class="piscante">60</div>
                    <div style="color: #f00; font-size: 12px;">
                        Tempo restante antes dos dados serem publicados.
                    </div>
                </div>
            `, 'verde', 500);

            let tempo = 60;
            const countdownEl = document.getElementById('countdown');
            const intervaloCountdown = setInterval(() => {
                tempo--;
                if (countdownEl) countdownEl.textContent = tempo;
                if (tempo <= 0) {
                    clearInterval(intervaloCountdown);
                    if (countdownEl) {
                        countdownEl.textContent = '0';
                        countdownEl.style.color = '#ff0';
                    }
                }
            }, 1000);

            await new Promise(r => setTimeout(r, 10000));
            await adicionarLinha('');
            await adicionarHTML(`
                <div style="border: 2px solid #0f0; padding: 20px; margin: 20px 0; text-align: center; background: #001100;">
                    <div style="font-size: 24px; color: #0f0; margin-bottom: 10px;">😄 PEGADINHA!</div>
                    <div style="color: #fff; font-size: 16px;">
                        Seu computador está seguro! <br><br>
                        <span style="color: #0f0;">Nada foi hackeado de verdade.</span><br>
                        Isso foi apenas uma brincadeira. 🛡️
                    </div>
                </div>
            `, 'verde', 500);

            setTimeout(() => {
                if (document.exitFullscreen) document.exitFullscreen();
                document.body.style.cursor = 'default';
            }, 5000);
        }
    </script>
</body>
</html>
